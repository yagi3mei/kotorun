<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>かなゲーム</title>
    <!-- 共通 -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/layout.css">
</head>
<body>
    <div class="header">
        <!-- ロゴ -->
        <header class="top-header">
            <a href="index.html">
                <img src="images/kotorun-logo.png"
                    alt="ことラン"
                    class="app-logo">
            </a>
        </header>
    </div>

    <div class="menu">
        <h1>かなゲーム</h1>

        <button onclick="goGame('seion')">
            せいおん<br>
            <small>あ・い・う…わ・を・ん</small>
        </button>

        <button onclick="goGame('dakuon')">
            だくおん・はんだくおん<br>
            <small>が・ぎ・ぐ…ぱ・ぴ・ぷ…</small>
        </button>

        <button onclick="goGame('youon')">
            ようおん<br>
            <small>きゃ・きゅ・きょ…</small>
        </button>

        <button onclick="goGame('katakana-seion')">
            カタカナ（せいおん）<br>
            <small>ア・イ・ウ…ワ・ヲ・ン</small>
        </button>

        <button onclick="goGame('katakana-dakuon')">
            カタカナ（だくおん）<br>
            <small>ガ・ギ・グ…パ・ピ・プ…</small>
        </button>

        <button onclick="goGame('katakana-youon')">
            カタカナ（ようおん）<br>
            <small>キャ・キュ・キョ…</small>
        </button>

        <button onclick="goGame('katakana-extra')">
            カタカナ（外来語）<br>
            <small>ファ・ティ・ディ…</small>
        </button>

        <!-- index.htmlへもどるボタン -->
        <div class="button-area">
            <button onclick="goBack()">もどる</button>
        </div>

    </div>

    <script>
    function goGame(type) {
        location.href = "kana-game.html?type=" + type;
    }
    
    function goBack() {
        location.href = "index.html";
    }
    </script>

</body>
</html>
