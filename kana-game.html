<!-- =========================================
     File: kana-game.html
     Purpose: かなゲームの共通プレイ画面（問題表示・入力・結果表示）
     Author: やぎさん
     Created: 2026-04-01
     Updated: 2026-04-30：css分割

     Notes:
     - 問題表示・回答入力・結果表示を行う共通ゲーム画面
     - 問題音声はボタンで再生（音声合成）
     - ミス時に効果音を再生
     - 共通スタイル: common.css / layout.css
     - ゲームUI: game.css
     - かな専用: kana.css
========================================= -->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- スマホ表示対応のviewport設定（必須） -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>かなゲーム</title>
    <!-- 共通 -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/layout.css">

    <!-- ゲーム系 -->
    <link rel="stylesheet" href="css/game.css">

    <!-- ページ専用 -->
    <link rel="stylesheet" href="css/kana.css">
</head>
<body>
    <!-- ヘッダー（タイマー・状態表示） -->
    <div class="header">
        <!-- ロゴ -->
        <header class="top-header">
            <a href="index.html">
                <img src="images/kotorun-logo.png"
                    alt="ことラン"
                    class="app-logo">
            </a>
        </header>
        
        <div id="timer-display">0.00</div>
        <div id="remaining-display">0</div>
        <div id="miss-display">0</div>
    </div>

    <!-- 問題表示エリア -->
    <div class="question-area">
        <div id="romaji-display">もんだい</div>
        <button id="sound-btn">🔊</button>
    </div>

    <!-- 操作ボタン -->
    <div class="button-area">
        <button id="start-btn">はじめる</button>
        <button id="back-btn" onclick="goMenu()">もどる</button>
    </div>

    <div class="card-container" id="card-container"></div>

    <!-- ✅ 終了モーダル -->
    <div id="result-modal" class="modal hidden">
        <div class="modal-content">
            <h2>かなゲーム　けっか</h2>
            <p id="date-time"></p>
            <p id="game-type-label"></p>
            <p id="final-time"></p>
            <p id="miss-result"></p>
            <button onclick="restartGame()">もういちど</button>
            <button onclick="goMenu()">メニューへ</button>
        </div>
    </div>

    <!-- ゲームスクリプト -->
    <script src="js/kana-game.js"></script>

    <!-- 間違い音の読み込み -->
    <audio id="sound-wrong" src="sounds/wrong.mp3"></audio>
</body>
</html>
