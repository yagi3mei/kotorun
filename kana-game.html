<!-- =========================================
     File: kana-game.html
     Purpose: かなゲームの共通プレイ画面（問題表示・入力・結果表示）
     Author: やぎさん
     Created: 2026-04-01
     Updated: 2026-04-30：css分割
     Updated: 2026-05-06：kana.cssをかるたゲームと共有化
     Updated: 2026-05-19：結果モーダルにベスト記録更新表示を追加

     Notes:
     - 問題表示・回答入力・結果表示を行う共通ゲーム画面
========================================= -->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>かなゲーム</title>

    <!-- 共通 -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/layout.css">

    <!-- ゲーム系 -->
    <link rel="stylesheet" href="css/game.css">

    <!-- ページ専用 -->
    <link rel="stylesheet" href="css/kana.css">

    <!-- Google Analytics -->
    <script async
        src="https://www.googletagmanager.com/gtag/js?id=G-B80JQLPCH4">
    </script>

    <script src="js/analytics.js"></script>

</head>

<body>

    <!-- ヘッダー -->
    <div class="header">

        <header class="top-header">
            <a href="index.html">
                <img src="images/kotorun-logo.png"
                     alt="ことラン"
                     class="app-logo">
            </a>
        </header>

        <div id="timer-display">0.00</div>
        <div id="remaining-display">0</div>
        <div id="miss-display">0</div>

    </div>

    <!-- 問題表示 -->
    <div class="question-area">
        <div id="romaji-display">もんだい</div>
        <button id="sound-btn">🔊</button>
    </div>

    <!-- スタート -->
    <div class="button-area">
        <button id="start-btn">はじめる</button>
    </div>

    <div class="kana-layout fixed" id="card-container"></div>

    <!-- 戻る -->
    <div class="button-area">
        <button id="back-btn" onclick="goMenu()">もどる</button>
    </div>

    <!-- 結果モーダル -->
    <div id="result-modal" class="modal hidden">

        <div class="modal-content">

            <h2>かなゲーム　けっか</h2>

            <p id="game-type-label"></p>

            <p id="date-time"></p>

            <!-- 今回の結果 -->
            <p id="miss-result"></p>
            <p id="final-time"></p>

            <hr>

            <!-- ベスト -->
            <p id="best-score-label">あなたのベストきろく</p>

            <p id="best-message"></p>

            <p id="best-date"></p>
            <p id="best-miss"></p>
            <p id="best-time"></p>

            <button onclick="restartGame()">もういちど</button>
            <button onclick="goMenu()">もどる</button>

        </div>

    </div>

    <!-- JS -->
    <script type="module" src="js/kana-game.js"></script>

    <!-- 音 -->
    <audio id="sound-wrong" src="sounds/wrong.mp3"></audio>

</body>
</html>
