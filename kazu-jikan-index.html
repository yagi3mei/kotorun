<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>かず・じかん</title>

    <!-- 共通 -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/layout.css">

</head>

<body>

    <div class="header">

        <!-- ロゴ -->
        <header class="top-header">

            <a href="index.html">

                <img src="images/kotorun-logo.png"
                     alt="ことラン"
                     class="app-logo">

            </a>

        </header>

        <button id="back-btn-top"
                onclick="goBack()">

            もどる

        </button>

    </div>

    <!-- メニュー -->
    <div class="menu">

        <h1>かず・じかん</h1>

        <!-- 日づけゲーム -->
        <button onclick="goCalendar()">

            ひづけゲーム<br>

            <small>
                ついたち・きょう・きのう…
            </small>

        </button>

        <!-- なんさいゲーム -->
        <button onclick="goAge()">

            なんさい？ゲーム<br>

            <small>
                いっさい・にさい・はたち…
            </small>

        </button>

        <!-- かぞえかたゲーム -->
        <button onclick="goKazoekata()">

            かぞえかたゲーム<br>

            <small>
                いっぽん・にほん・さんぼん…
            </small>

        </button>

        <!-- とけいゲーム -->
        <button onclick="goTokei()">

            とけいゲーム<br>

            <small>
                いちじ・にじ・さんじ…
            </small>

        </button>

        <!-- 今後追加予定 -->
        <!--
        <button>からだ</button>
        <button>くに</button>
        -->

        <!-- 学習者向け説明 -->
        <small>

            かず や じかん の<br>

            よみかたを れんしゅうします。

        </small>

    </div>

    <script>

        // ひづけゲームメニューへ遷移
        function goCalendar() {

            location.href = "hizuke-index.html";

        }

        // なんさいゲームへ遷移
        function goAge() {

            location.href = "age-game.html";

        }

        // かぞえかたゲームへ
        function goKazoekata() {

            location.href =
                "kazoekata-list.html";

        }

        // とけいゲームへ
        function goTokei() {

            location.href =
                "tokei-index.html";

        }

        // 戻る
        function goBack() {

            location.href = "index.html";

        }

    </script>

</body>
</html>
