<!-- =========================================
     File: family-game.html
     Purpose: かるたゲーム内のfamilyモードのプレイ画面（家族表現の理解・選択）
     Author: やぎさん
     Created: 2026-04-09
     Updated: 2026-05-08：親戚モード(relative)追加

     Notes:
     - family-index.html から mode を受け取る
     - inner / outer / relative に対応
     - relative は専用レイアウトを使用
========================================= -->

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>かぞくゲーム</title>

    <!-- 共通 -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/layout.css">

    <!-- ゲーム系 -->
    <link rel="stylesheet" href="css/game.css">

    <!-- ページ専用 -->
    <link rel="stylesheet" href="css/family.css">
</head>

<body>

    <div class="header">

        <header class="top-header">
            <a href="index.html">
                <img src="images/kotorun-logo.png"
                    class="app-logo"
                    alt="ことラン">
            </a>
        </header>

        <div id="timer-display">0.00</div>
        <div id="remaining-display">0</div>
        <div id="miss-display">0</div>

    </div>


    <div class="question-area">

        <div id="romaji-display">
            もんだい
        </div>

        <button id="sound-btn">
            🔊
        </button>

    </div>


    <!-- モード表示 -->
    <div id="family-mode-label"
        class="family-mode-label">

        うちの

    </div>


    <!-- =====================================
         通常レイアウト（inner / outer）
    ====================================== -->
    <div id="family-board-normal"
        class="family-board">

        <div id="sofu" class="family-card"></div>
        <div id="sobo" class="family-card"></div>

        <div id="chichi" class="family-card"></div>
        <div id="haha" class="family-card"></div>

        <div id="ani" class="family-card"></div>
        <div id="ane" class="family-card"></div>

        <div id="family-center"
            class="family-center">

            わたし

        </div>

        <div id="otouto" class="family-card"></div>
        <div id="imouto" class="family-card"></div>

    </div>


    <!-- =====================================
         親戚レイアウト（relative）
    ====================================== -->
    <div id="family-board-relative"
        class="family-board-relative hidden">

        <!-- 1段目 -->
        <div class="empty"></div>

        <div id="relative-sofu"
            class="family-card">
        </div>

        <div id="relative-sobo"
            class="family-card">
        </div>

        <!-- 2段目 -->
        <div class="family-center-small">
            ちち/はは
        </div>

        <div id="relative-ojisan"
            class="family-card">
        </div>

        <div id="relative-obasan"
            class="family-card">
        </div>


        <!-- 3段目 -->
        <div class="family-center-small">
            わたし
        </div>

        <div id="relative-itoko"
            class="family-card">
        </div>

        <div class="empty"></div>

    </div>


    <div class="button-area">

        <button id="back-btn"
            onclick="goBack()">

            もどる

        </button>

    </div>


    <!-- 結果モーダル -->
    <div id="result-modal"
        class="modal hidden">

        <div class="modal-content">

            <h2>
                かぞくゲーム けっか
            </h2>

            <p id="result-text"></p>

            <button onclick="restartGame()">
                もういちど
            </button>

            <button onclick="goBack()">
                もどる
            </button>

        </div>

    </div>


    <!-- ゲームロジック -->
    <script type="module"
        src="js/family-game.js">
    </script>

</body>
</html>
