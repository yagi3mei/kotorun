     File: family-index.html
     Purpose: familyかるたゲームのモード選択画面（内・外の家族）
     Author: やぎさん
     Created: 2026-04-09
     Updated: 2026-04-30：css分割

     Notes:
     - 家族表現（内の家族 / 外の家族）を選択する画面
     - 今後、親戚表現（おじ・おば等）を追加予定
     - 「おじいさん / おばあさん」などの使い分け学習にも対応予定
     - 共通スタイルは common.css / layout.css を使用
     - ゲーム画面は family-game.html に遷移して実行
========================================= -->

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>かぞく かるた</title>
    <!-- 共通 -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/layout.css">
</head>

<body>

    <div class="header">

        <header class="top-header">
            <a href="index.html">
                <img src="images/kotorun-logo.png" class="app-logo" alt="ことラン">
            </a>
        </header>

        <button id="back-btn-top" onclick="goBack()">
            もどる
        </button>

    </div>

    <div class="menu">

        <h1>かぞくを えらんでね</h1>

        <button onclick="goFamily('inner')">
            うちの（わたしの） かぞく<br>
            <small>ちち・はは…</small>
        </button>

        <button onclick="goFamily('outer')">
            ともだちの かぞく<br>
            <small>おとうさん・おかあさん…</small>
        </button>
    </div>

    <script>

        // mode: inner（自分の家族） / outer（他人の家族）
        function goFamily(mode){
        location.href=
        `family-game.html?mode=${mode}`;
        }

        function goBack(){
        location.href="karuta-index.html";
        }

    </script>

</body>
</html>
