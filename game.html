<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>かなゲーム</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <div id="timer-display">0.00</div>
        <div id="remaining-display">0</div>
        <div id="miss-display">0</div>
    </div>

    <div class="question-area">
        <div id="romaji-display">もんだい</div>
        <button id="sound-btn">🔊</button>
    </div>

    <div class="button-area">
        <button id="start-btn">はじめる</button>
        <button id="back-btn" onclick="goMenu()">もどる</button>
    </div>

    <div class="card-container" id="card-container"></div>

    <!-- ✅ 終了モーダル -->
    <div id="result-modal" class="modal hidden">
        <div class="modal-content">
            <h2>クリア！</h2>
            <p id="date-time"></p>
            <p id="game-type-label"></p>
            <p id="final-time"></p>
            <p id="miss-result"></p>
            <button onclick="restartGame()">もういちど</button>
            <button onclick="goMenu()">メニューへ</button>
        </div>
    </div>

    <script src="game.js"></script>

    <!-- <audio id="sound-correct" src="sounds/correct.mp3"></audio> -->
    <audio id="sound-wrong" src="sounds/wrong.mp3"></audio>
</body>
</html>
