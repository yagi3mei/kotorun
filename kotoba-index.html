<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ことば</title>

    <!-- 共通 -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/layout.css">

    <!-- Google Analytics -->
    <script async
        src="https://www.googletagmanager.com/gtag/js?id=G-B80JQLPCH4">
    </script>

    <script src="js/analytics.js"></script>

</head>

<body>

    <div class="header">
        <!-- ロゴ -->
        <header class="top-header">
            <a href="index.html">
                <img src="images/kotorun-logo.png"
                     alt="ことラン"
                     class="app-logo">
            </a>
        </header>

        <button id="back-btn-top"
                onclick="goBack()">
            もどる
        </button>
    </div>

    <!-- メニュー -->
    <div class="menu">

        <h1>ことば</h1>

        <!-- たんごかるた -->
        <button onclick="goKaruta()">
            たんごかるた<br>
            <small>
                たべもの・どうぶつ・スポーツ…
            </small>
        </button>

        <!-- ことばさがし -->
        <button onclick="goKotobasagashi()">
            ことばさがし<br>
            <small>
                おぼえた ことばを さがそう！
            </small>
        </button>

        <!-- かぞく -->
        <button onclick="goFamily()">
            かぞくゲーム<br>
            <small>
                ちち・はは・おじさん…
            </small>
        </button>

        <!-- からだゲーム -->       
        <button onclick="goKarada()">
            からだゲーム<br>
            <small>
                め・みみ・くち…
            </small>
        </button>  

        <!-- くに・ちいきゲーム -->
        <button onclick="goCountry()">
            くに・ちいきゲーム<br>
            <small>
                にほん・たいわん・ベトナム…
            </small>
        </button>

        <!-- 学習者向け説明 -->
        <small>
            ことばを おぼえる<br>
            にほんごゲームです。
        </small>
    </div>

    <script>

        // たんごかるた
        function goKaruta() {
            location.href =
                "karuta-index.html";
        }

        // ことばさがし
        function goKotobasagashi()
        {
            location.href =
                "kotobasagashi-index.html";
        }

        // かぞく
        function goFamily() {
            location.href =
                "family-index.html";
        }

        // からだ
        function goKarada() {
            location.href =
                "karada-index.html";
        }

        // くに・ちいき
        function goCountry() {
            location.href =
                "country-game.html";
        }

        // 戻る
        function goBack() {
            location.href =
                "index.html";
        }

    </script>

</body>
</html>
