<!-- =========================================
     File: relative-time-game.html
     Purpose: ひづけ（相対時間）ゲーム プレイ画面
     Author: やぎさん
     Created: 2026-06-13

     Notes:
     - 日付・週・月・年・ランダム共通画面
     - URLパラメータ mode により表示切替
     - UI生成は relative-time-game.js
========================================= -->

<!DOCTYPE html>

<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>ひづけゲーム</title>

    <!-- 共通 -->
    <link rel="stylesheet" href="css/common.css">

    <link rel="stylesheet" href="css/layout.css">

    <!-- ゲーム共通 -->
    <link rel="stylesheet" href="css/game.css">

    <!-- ページ専用 -->
    <link rel="stylesheet" href="css/relative-time.css">

    <!-- Google Analytics -->
    <script async
        src="https://www.googletagmanager.com/gtag/js?id=G-B80JQLPCH4">
    </script>

    <script src="js/analytics.js"></script>

</head>

<body>

    <!-- =====================================
        ヘッダー
    ====================================== -->
    <div class="header">

        <header class="top-header">

            <a href="index.html">

                <img src="images/kotorun-logo.png"
                    alt="ことラン"
                    class="app-logo">

            </a>

        </header>

        <!-- タイマー -->
        <div id="timer-display">

            0.00

        </div>

        <!-- 残り -->
        <div id="remaining-display">

            のこり：0

        </div>

        <!-- ミス -->
        <div id="miss-display">

            ミス：0

        </div>

    </div>


    <!-- =====================================
        問題表示
    ====================================== -->
    <div class="question-area">

        <div id="question-display">

            きょう（今日）

        </div>

        <button id="sound-btn">

            🔊

        </button>

    </div>

    <!-- =====================================
        ゲームエリア
    ====================================== -->
    <div id="game-area">

        <!--

        dayモード
        weekモード
        monthモード
        yearモード

        をJSで生成

        -->

    </div>


    <!-- =====================================
        もどる
    ====================================== -->
    <div class="button-area">

        <button id="back-btn"
                onclick="goMenu()">

            もどる

        </button>

    </div>


    <!-- =====================================
        結果モーダル
    ====================================== -->
    <div id="result-modal"
        class="modal hidden">

        <div class="modal-content">

            <h2>

                ひづけゲーム　けっか

            </h2>

            <p id="game-type-label"></p>

            <p id="date-time"></p>

            <p id="miss-result"></p>

            <p id="final-time"></p>

            <hr>

            <p id="best-score-label">

                あなたのベストきろく

            </p>

            <p id="best-message"></p>

            <p id="best-date"></p>

            <p id="best-miss"></p>

            <p id="best-time"></p>

            <hr>

            <!-- 間違えた問題 -->
            <p>

                ＜まちがえた もんだい＞

            </p>

            <div id="wrong-list-area"
                class="word-list-scroll">

            </div>            

            
            <button onclick="restartGame()">

                もういちど

            </button>

            <button onclick="goMenu()">

                もどる

            </button>

        </div>

    </div>


    <!-- 正解音 -->
    <audio id="sound-correct"
        src="sounds/correct.mp3">
    </audio>

    <!-- 不正解音 -->
    <audio id="sound-wrong"
        src="sounds/wrong.mp3">
    </audio>


    <!-- =====================================
        ゲームスクリプト
    ====================================== -->
    <script type="module"
            src="js/relative-time-game.js">
    </script>

</body>

</html>
