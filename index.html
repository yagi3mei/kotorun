<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- スマホ表示対応のviewport設定（必須） -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ことラン</title>
    <!-- 共通 -->
    <link rel="stylesheet" href="css/common.css">
    <!-- ページ専用 -->
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <!-- メインコンテンツ（トップ画面） -->
    <main class="hero-area">
    
          <!-- ランナーイラスト -->
        <img src="images/kotorun-runners.png"
             alt="ことラン ランナー"
             class="runner-visual">


        <!-- メニュー -->
        <p>日本語をれんしゅうしよう！</p>

        <div class="top-menu">
            <a href="kana-index.html" class="menu-btn">
                かなゲーム
            </a>

            <a href="karuta-index.html" class="menu-btn">
                かるたゲーム
            </a>

            <a href="iroiro-index.html" class="menu-btn">
                いろいろなゲーム
            </a>
        </div>

    </main>

    <div id="browser-warning" class="warning-modal hidden">
        <div class="warning-box">
            <h2>⚠ 注意</h2>

            <p>
                このブラウザでは<br>
                音声が正常に動作しない場合があります
            </p>

            <p>
                右上メニューから<br>
                「外部ブラウザで開く」をお試しください
            </p>

            <button id="warning-close">
                OK
            </button>
        </div>
    </div>

    <script>
        const ua = navigator.userAgent;

        const isInAppBrowser =
            ua.includes("FBAN") ||
            ua.includes("FBAV") ||
            ua.includes("Instagram") ||
            ua.includes("Line");

        const modal = document.getElementById("browser-warning");

        if (isInAppBrowser) {
            modal.classList.remove("hidden");
        }

        document
            .getElementById("warning-close")
            .addEventListener("click", () => {
                modal.classList.add("hidden");
            });
    </script>

</body>
</html>
