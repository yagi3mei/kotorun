<!-- =========================================
     File: karuta-index.html
     Purpose: かるた系ゲームのメニュー選択画面
     Author: やぎさん
     Created: 2026-04-09
     Updated: 2026-04-30：css分割
     Updated: 2026-05-06：カタカナ一覧修正
     Updated: 2026-05-07：かぞくゲームをiroiro-indexへ移動

     Notes:
     - 各ゲームモード（ひらがな・カタカナ）への入口画面
     - URLパラメータ（type, group）を付与して次画面へ遷移
     - 共通スタイルは common.css / layout.css を使用
========================================= -->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>かるたゲーム選択</title>

    <!-- 共通 -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/layout.css">
</head>

<body>

    <div class="header">

        <!-- ロゴ -->
        <header class="top-header">
            <a href="index.html">
                <img src="images/kotorun-logo.png"
                     alt="ことラン"
                     class="app-logo">
            </a>
        </header>

        <button id="back-btn-top" onclick="goBack()">
            もどる
        </button>

    </div>

    <!-- ゲーム選択ボタン -->
    <div class="menu">

        <h1>かるたゲーム</h1>

        <button onclick="go('hira', 'seion')">
            ひらがな（せいおん）<br>
            <small>あ・い・う…</small>
        </button>

        <button onclick="go('hira', 'dakuon')">
            ひらがな（だくおん）<br>
            <small>が・ぎ・ぐ…</small>
        </button>

        <button onclick="go('hira', 'youon')">
            ひらがな（ようおん）<br>
            <small>きゃ・しゅ・ちょ…</small>
        </button>

        <button onclick="go('kata', 'seion')">
            カタカナ<br>
            <small>ア・イ・ウ…</small>
        </button>

        <button onclick="go('kata', 'dakuon')">
            カタカナ（だくおん）<br>
            <small>ガ・ギ・グ…</small>
        </button>

        <button onclick="go('kata', 'youon')">
            カタカナ（ようおん）<br>
            <small>キャ・シュ・チョ…</small>
        </button>

        <!-- 学習者向け説明 -->
        <small>
            ことばを れんしゅうします。<br>
            みんなの日本語 初級Ⅰの ことばです。<br>
            みて、きいて えを えらびます。<br>
            <br>
            ※先生へ...学習者に説明をお願いします。<br>
            ・かるたは選択した文字から始まる単語です。<br>
            ・イラストにできる単語しかありません。
        </small>

    </div>

    <script>

        // かな・かるた一覧画面へ遷移
        function go(type, group) {
            location.href =
                `karuta-list.html?type=${type}&group=${group}`;
        }

        // 戻る
        function goBack() {
            location.href = "index.html";
        }

    </script>

</body>
</html>
