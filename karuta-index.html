<!-- =========================================
     File: karuta-index.html
     Purpose: かるた系ゲームのメニュー選択画面
     Author: やぎさん
     Created: 2026-04-09
     Updated: 2026-04-30：css分割

     Notes:
     - 各ゲームモード（ひらがな・カタカナ・かぞく）への入口画面
     - URLパラメータ（type, group）を付与して次画面へ遷移
     - 共通スタイルは common.css / layout.css を使用
========================================= -->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>かるたゲーム選択</title>
    <!-- 共通 -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/layout.css">
</head>
<body>
    <div class="header">
        <!-- ロゴ -->
        <header class="top-header">
            <a href="index.html">
                <img src="images/kotorun-logo.png"
                    alt="ことラン"
                    class="app-logo">
            </a>
        </header>
    </div>

    <!-- ゲーム選択ボタン -->
    <div class="menu">
        <h1>かるたゲーム</h1>

        <button onclick="go('hira', 'seion')">
            ひらがな（せいおん）<br>
            <small>あ・い・う…</small>
        </button>

        <button onclick="go('hira', 'dakuon')">
            ひらがな（だくおん）<br>
            <small>が・ぎ・ぐ…</small>
        </button>

        <button onclick="goList('katakana')">
            カタカナ<br>
            <small>ア・イ・ウ…</small>
        </button>

        <button onclick="goFamily()">
            かぞく<br>
            <small>ちち・はは…</small>
        </button>

        <!-- もどるボタン -->
        <div class="button-area">
            <button onclick="goBack()">もどる</button>
        </div>

        <!-- 学習者向け説明 -->
        <small>
            ことばを れんしゅうします。<br>
            みんなの日本語 初級Ⅰの ことばです。<br>
            えが ある ことばだけです。<br>
            みて、きいて えを えらびます。<br>
            まちがえると ★が でます。<br>
        </small>
    </div>

    <script>
        // かな・かるた一覧画面へ遷移
        function go(type, group) {
            location.href = `karuta-list.html?type=${type}&group=${group}`;
        }

        // 家族ゲームへ遷移
        function goFamily(){
            location.href="family-index.html";
        }

        function goBack(){
            location.href = "index.html";
        }
    </script>

</body>
</html>
