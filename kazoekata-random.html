<!DOCTYPE html>

<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>じょすうしランダムゲーム</title>

    <!-- 共通 -->
    <link rel="stylesheet"
        href="css/common.css">

    <link rel="stylesheet"
        href="css/layout.css">

    <!-- ゲーム -->
    <link rel="stylesheet"
        href="css/game.css">

    <!-- 既存流用 -->
    <link rel="stylesheet"
        href="css/kazoekata.css">

    <!-- Google Analytics -->
    <script async
        src="https://www.googletagmanager.com/gtag/js?id=G-B80JQLPCH4">
    </script>

    <script src="js/analytics.js"></script>

</head>

<body>

    <!-- ヘッダー -->
    <div class="header">

        <header class="top-header">

            <a href="index.html">

                <img src="images/kotorun-logo.png"
                    alt="ことラン"
                    class="app-logo">

            </a>

        </header>

        <div id="timer-display">
            0.00
        </div>

        <div id="remaining-display">
            0
        </div>

        <div id="miss-display">
            0
        </div>

    </div>


    <!-- 設問 -->
    <div class="question-area">

        <div id="question-text">

            えんぴつが？

        </div>

        <button id="sound-btn">

            🔊

        </button>

    </div>


    <!-- イラスト -->
    <div class="question-image-area">

        <img id="question-image"
            src=""
            alt="問題画像">

    </div>


    <!-- 選択肢 -->
    <div id="choices-area"
        class="choices-area">

    </div>


    <!-- 戻る -->
    <div class="button-area">

        <button id="back-btn"
                onclick="goMenu()">

            もどる

        </button>

    </div>


    <!-- 結果 -->
    <div id="result-modal"
        class="modal hidden">

        <div class="modal-content">

            <h2>

                じょすうしランダムゲーム　けっか

            </h2>

            <p id="game-type-label"></p>

            <p id="date-time"></p>

            <p id="final-time"></p>

            <p id="miss-result"></p>

            <hr>

            <p id="best-score-label">

                あなたのベストきろく

            </p>

            <p id="best-message"></p>

            <p id="best-date"></p>

            <p id="best-miss"></p>

            <p id="best-time"></p>

            <hr>

            <p id="word-list-label">

                まちがえた もんだい

            </p>

            <div id="wrong-list"
                class="word-list-scroll">
            </div>

            <button onclick="restartGame()">

                もういちど

            </button>

            <button onclick="goMenu()">

                もどる

            </button>

        </div>

    </div>


    <!-- 音声 -->
    <audio id="sound-correct"
        src="sounds/correct.mp3">
    </audio>

    <audio id="sound-wrong"
        src="sounds/wrong.mp3">
    </audio>


    <!-- JS -->
    <script type="module"
            src="js/kazoekata-random.js">
    </script>

</body>

</html>
