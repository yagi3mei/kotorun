<!DOCTYPE html>

<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>からだゲーム</title>

    <!-- 共通 -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/layout.css">
    <!-- ゲーム系 -->
    <link rel="stylesheet" href="css/game.css">
    <!-- からだゲーム専用 -->
    <link rel="stylesheet" href="css/karada.css">

</head>
<body>
    <div class="header">

        <!-- ロゴ -->
        <header class="top-header">
            <a href="index.html">
                <img
                    src="images/kotorun-logo.png"
                    alt="ことラン"
                    class="app-logo">
            </a>
        </header>

        <!-- ステータス表示 -->
        <div id="timer-display">
            0.00
        </div>

        <div id="remaining-display">
            のこり：10
        </div>

        <div id="miss-display">
            ミス：0
        </div>

    </div>

    <h2 id="questionText"></h2>

    <div class="image-container">

        <img
            id="faceImage"
            src="images/body/face.png"
            alt="face"
        >

        <div id="marker"></div>

    </div>

    <!-- 選択肢表示エリア -->
    <div
        id="choicesContainer"
        class="choices-area">
    </div>

    <!-- =====================================
        戻るボタン
    ===================================== -->
    <div class="button-area">

        <button
            id="back-btn"
            onclick="goBack()">

            もどる

        </button>

    </div>


    <!-- 結果モーダル -->

    <div id="result-modal"
        class="modal hidden">

        <div class="modal-content">

            <h2>

                からだゲーム　けっか

            </h2>

            <!-- ゲーム情報 -->
            <p id="game-level-label"></p>

            <p id="date-time"></p>

            <!-- 今回結果 -->
            <p id="miss-result"></p>

            <p id="final-time"></p>

            <hr>

            <!-- ベスト -->
            <p id="best-score-label">

                あなたのベストきろく

            </p>

            <p id="best-message"></p>

            <p id="best-date"></p>

            <p id="best-miss"></p>

            <p id="best-time"></p>

            <hr>

            <!-- ミス一覧 -->
            <p>

                ＜まちがえたもんだい＞

            </p>

            <div id="wrong-list-area"
                class="word-list-scroll">

            </div>

            <button onclick="restartGame()">

                もういちど

            </button>

            <button onclick="goBack()">

                もどる

            </button>

        </div>

    </div>

    <audio
        id="sound-wrong"
        src="sounds/wrong.mp3">
    </audio>

    <script type="module"
        src="js/karada-game.js">
    </script>

</body>
</html>
