<!-- =========================================
     File: kazoekata-list.html
     Purpose: かぞえかたゲームの種類選択画面
     Author: やぎさん
     Created: 2026-05-12
     Updated: 2026-05-22：LocalStorageにベストスコア保存機能追加

     Notes:
     - 助数詞（ほん・まい・さつ等）を選択
     - 選択内容をURLパラメータで渡す
     - 共通スタイル:
       common.css / layout.css
========================================= -->

<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>かぞえかたゲーム</title>

    <!-- 共通 -->
    <link rel="stylesheet"
          href="css/common.css">

    <link rel="stylesheet"
          href="css/layout.css">

</head>

<body>

    <!-- =====================================
         ヘッダー
    ====================================== -->
    <div class="header">

        <!-- ロゴ -->
        <header class="top-header">

            <a href="index.html">

                <img src="images/kotorun-logo.png"
                     alt="ことラン"
                     class="app-logo">

            </a>

        </header>

        <!-- 戻る -->
        <button id="back-btn-top"
                onclick="goBack()">

            もどる

        </button>

    </div>


    <!-- =====================================
         メニュー
    ====================================== -->
    <div class="menu">

        <h1>

            かぞえかたゲーム<br>

        </h1>


        <!-- 個 -->
        <button onclick="goGame('tsu')">

            ～つ<br>

            <small>
                ひとつ・ふたつ・みっつ
            </small>

        </button>

        <!-- 個 -->
        <button onclick="goGame('ko')">

            こ（個）<br>

            <small>
                いっこ・にこ・さんこ
            </small>

        </button>


        <!-- 本 -->
        <button onclick="goGame('hon')">

            ほん（本）<br>

            <small>
                いっぽん・にほん・さんぼん
            </small>

        </button>


        <!-- 枚 -->
        <button onclick="goGame('mai')">

            まい（枚）<br>

            <small>
                いちまい・にまい・さんまい
            </small>

        </button>


        <!-- 人 -->
        <button onclick="goGame('nin')">

            にん（人）<br>

            <small>
                ひとり・ふたり・さんにん
            </small>

        </button>


        <!-- 台 -->
        <button onclick="goGame('dai')">

            だい（台）<br>

            <small>
                いちだい・にだい・さんだい
            </small>

        </button>


        <!-- 冊 -->
        <button onclick="goGame('satsu')">

            さつ（冊）<br>

            <small>
                いっさつ・にさつ・さんさつ
            </small>

        </button>


        <!-- 匹 -->
        <!-- <button onclick="goGame('hiki')">

            ひき（匹）<br>

            <small>
                いっぴき・にひき・さんびき
            </small>

        </button> -->


        <!-- 学習者向け説明 -->
        <small>

            かずの よみかたを<br>

            みて、きいて、おぼえよう！

        </small>

    </div>


    <!-- =====================================
         スクリプト
    ====================================== -->
    <script type="module">

        import {
            getCategoryScores
        }
        from "./js/storage.js";

        /* =========================
           ゲーム開始
        ========================= */

        window.goGame = function(type) {

            location.href =
                `kazoekata-game.html?type=${type}`;

        }


        /* =========================
           戻る
        ========================= */

        window.goBack = function() {

            location.href =
                "kazu-jikan-index.html";

        }

        /* =========================
        実施済み表示
        ========================= */

        const scores =
            getCategoryScores(
                "kazoekata"
            );


        document
            .querySelectorAll(".menu button")
            .forEach(button => {

                const onclickText =
                    button.getAttribute(
                        "onclick"
                    );

                if (!onclickText) {
                    return;
                }

                const match =
                    onclickText.match(
                        /goGame\('(.+?)'\)/
                    );

                if (!match) {
                    return;
                }

                const type =
                    match[1];

                if (scores[type]) {

                    button.classList.add(
                        "completed"
                    );

                }

            });

    </script>

</body>
</html>
