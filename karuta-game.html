<!-- =========================================
     File: karuta-game.html
     Purpose: かるた（ひらがな・カタカナ）ゲームの共通プレイ画面
     Author: やぎさん
     Created: 2026-04-09
     Updated: 2026-04-30：css分割
     Updated: 2026-05-20：LocalStorageにベストスコア保存機能追加

     Notes:
     - 問題表示・回答入力・結果表示を行う共通ゲーム画面
     - URLパラメータ（type, kana）に応じて問題内容を切り替える
     - 問題音声はボタンで再生（音声合成）
     - 正解時及びミス時に効果音を再生
     - 共通スタイル: common.css / layout.css
     - ゲームUI: game.css
     - かるた専用: karuta.css
========================================= -->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>たんごかるた</title>
    <!-- 共通 -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/layout.css">
    <!-- ゲーム系 -->
    <link rel="stylesheet" href="css/game.css">
    <!-- ページ専用 -->
    <link rel="stylesheet" href="css/karuta.css">

    <!-- Google Analytics -->
    <script async
        src="https://www.googletagmanager.com/gtag/js?id=G-B80JQLPCH4">
    </script>

    <script src="js/analytics.js"></script>

</head>
<body>

    <div class="header">
          <!-- ロゴ -->
          <header class="top-header">
              <a href="index.html">
                  <img src="images/kotorun-logo.png"
                      alt="ことラン"
                      class="app-logo">
              </a>
          </header>
          <!-- ステータス表示（タイマー・残り・ミス） -->
          <div id="timer-display">0.00</div>
          <div id="remaining-display">0</div>
          <div id="miss-display">0</div>
    </div>

    <!-- 問題表示エリア -->
    <div class="question-area">
          <div id="romaji-display">もんだい</div>
          <button id="sound-btn">🔊</button>
    </div>

    <!-- カード表示エリア -->
    <div id="cards"></div>

    <!-- もどるボタン -->
    <div class="button-area">
        <button id="back-btn" onclick="goBack()">もどる</button>
    </div>

    
    <!-- 結果モーダル --> 
    <div id="result-modal" class="modal hidden">
        <div class="modal-content">
            <h2>たんごかるた　けっか</h2>

            <!-- ゲーム情報 -->
            <p id="game-type-label"></p>
            <p id="date-time"></p>
            
            <!-- 今回の結果 -->
            <p id="miss-result"></p>
            <p id="final-time"></p>

            <hr>

            <!-- ベスト -->
            <p id="best-score-label">
                あなたのベストきろく
            </p>
            
            <p id="best-message"></p>
            <p id="best-date"></p>
            <p id="best-miss"></p>
            <p id="best-time"></p>

            <hr>
            
            <!-- 今回の単語 -->
            <p>
                ＜こんかいのたんご＞
            </p>
            <div id="word-list-area"
                class="word-list-scroll">
            </div>

            <button onclick="restartGame()">
                もういちど
            </button>
            
            <button onclick="goBack()">
                もどる
            </button>
        </div>
    </div>

    <!-- ゲームロジック -->
    <script type="module" src="js/karuta-game.js"></script>

</body>
</html>
