<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>かるたゲーム</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <h1>かるたゲーム（あ）</h1>
  <h2>プロトタイプ</h2>

  <div class="question-area">
    <p id="romaji-display">loading...</p>
    <button id="sound-btn" onclick="playAudio()">🔊</button>
  </div>

  <div id="cards"></div>

  <div class="button-area">
    <button onclick="goBack()">もどる</button>
  </div>

  <script type="module" src="js/karuta-game.js"></script>

  <!-- モーダル -->
  <div id="result-modal" class="modal hidden">
    <div class="modal-content">
      <h2>けっか</h2>
      <p id="result-text"></p>

      <button onclick="restartGame()">もういちど</button>
      <button onclick="goBack()">もどる</button>
    </div>
  </div>

</body>
</html>
