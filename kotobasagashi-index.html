<!-- =========================================
     File: karuta-index.html
     Purpose: ことばさがしゲームのメニュー選択画面
     Author: やぎさん
     Created: 2026-07-14

     Notes:
     - 各ゲームモード（ひらがな・カタカナ）への入口画面
     - URLパラメータ（type, group）を付与して次画面へ遷移
     - 共通スタイルは common.css / layout.css を使用
========================================= -->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ことばさがし選択</title>

    <!-- 共通 -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/layout.css">

    <!-- Google Analytics -->
    <script async
        src="https://www.googletagmanager.com/gtag/js?id=G-B80JQLPCH4">
    </script>

    <script src="js/analytics.js"></script>

</head>

<body>

    <div class="header">

        <!-- ロゴ -->
        <header class="top-header">
            <a href="index.html">
                <img src="images/kotorun-logo.png"
                     alt="ことラン"
                     class="app-logo">
            </a>
        </header>

        <button id="back-btn-top" onclick="goBack()">
            もどる
        </button>

    </div>

    <!-- ゲーム選択ボタン -->
    <div class="menu">

        <h1>ことばさがし</h1>

        <button onclick="go('hira', 'seion')">
            ひらがな（せいおん）<br>
            <small>あ・い・う…</small>
        </button>

        <button onclick="go('hira', 'dakuon')">
            ひらがな（だくおん）<br>
            <small>が・ぎ・ぐ…</small>
        </button>

        <button onclick="go('hira', 'youon')">
            ひらがな（ようおん）<br>
            <small>きゃ・しゅ・ちょ…</small>
        </button>

        <button onclick="go('kata', 'seion')">
            カタカナ（せいおん/ようおん）<br>
            <small>ア・イ・シャ…</small>
        </button>

        <button onclick="go('kata', 'dakuon')">
            カタカナ（だくおん/ようおん）<br>
            <small>ガ・ギ・ジョ…</small>
        </button>

        <!-- <button onclick="go('kata', 'youon')">
            カタカナ（ようおん）<br>
            <small>キャ・シュ・チョ…</small>
        </button> -->

        <!-- 学習者向け説明 -->
        <small>
            ことばを れんしゅうします。<br>
            みんなの日本語 初級Ⅰの ことばです。<br>
            えをみて ことばを さがします。<br>
            <br>
            ※先生へ...学習者に説明をお願いします。<br>
            ・イラストを見て、ことばを思い出します。<br>
            ・文字の中から、ことばをさがします。<br>
        </small>

    </div>

    <script>

        // かな・かるた一覧画面へ遷移
        function go(type, group) {
            location.href =
            `kotobasagashi-list.html?type=${type}&group=${group}`;
        }

        // 戻る
        function goBack() {
            location.href = "kotoba-index.html";
        }

    </script>

</body>
</html>
