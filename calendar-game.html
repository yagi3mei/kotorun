<!-- =========================================
     File: calendar-game.html
     Purpose: 日づけ（カレンダー）ゲーム画面
     Author: やぎさん
     Created: 2026-05-09

     Notes:
     - 日づけの読み方を学習するゲーム
     - 音声とひらがな問題を見て正しい日付を選ぶ
     - 1〜31日をカレンダー形式で表示
     - 共通スタイル: common.css / layout.css
     - ゲームUI: game.css
     - カレンダー専用: calendar.css
========================================= -->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <!-- スマホ表示対応 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>日づけゲーム</title>

    <!-- 共通 -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/layout.css">

    <!-- ゲーム系 -->
    <link rel="stylesheet" href="css/game.css">

    <!-- ページ専用 -->
    <link rel="stylesheet" href="css/calendar.css">
</head>

<body>
    <!-- ヘッダー -->
    <div class="header">

        <!-- ロゴ -->
        <header class="top-header">
            <a href="index.html">
                <img src="images/kotorun-logo.png"
                    alt="ことラン"
                    class="app-logo">
            </a>
        </header>

        <!-- 経過時間 -->
        <div id="timer-display">0.00</div>

        <!-- 残り問題数 -->
        <div id="remaining-display">0</div>

        <!-- ミス数 -->
        <div id="miss-display">0</div>
    </div>

    <!-- 問題表示エリア -->
    <div class="question-area">
        <div id="question-display">ついたち</div>

        <!-- 音声再生 -->
        <button id="sound-btn">🔊</button>
    </div>

    <!-- はじめるボタン -->
    <div class="button-area">
        <button id="start-btn">はじめる</button>
    </div>

    <!-- カレンダーエリア -->
    <div class="calendar-wrapper">

        <!-- タイトル -->
        <h2 class="calendar-title">カレンダー</h2>

        <!-- 曜日 -->
        <div class="calendar-weekdays">
            <div class="weekday sunday">日</div>
            <div class="weekday">月</div>
            <div class="weekday">火</div>
            <div class="weekday">水</div>
            <div class="weekday">木</div>
            <div class="weekday">金</div>
            <div class="weekday saturday">土</div>
        </div>

        <!-- 日付カード -->
        <div id="calendar-grid" class="calendar-grid">
            <!-- JSで1〜31日を生成 -->
        </div>
    </div>

    <!-- もどるボタン -->
    <div class="button-area">
        <button id="back-btn" onclick="goMenu()">もどる</button>
    </div>

    <!-- 結果モーダル -->
    <div id="result-modal" class="modal hidden">
        <div class="modal-content">

            <h2>日づけゲーム　けっか</h2>

            <p id="date-time"></p>

            <p id="game-type-label"></p>

            <p id="final-time"></p>

            <p id="miss-result"></p>

            <button onclick="restartGame()">もういちど</button>

            <button onclick="goMenu()">メニューへ</button>
        </div>
    </div>

    <!-- ゲームスクリプト -->
    <script type="module" src="js/calendar-game.js"></script>

    <!-- 正解音 -->
    <audio id="sound-correct" src="sounds/correct.mp3"></audio>

    <!-- 間違い音 -->
    <audio id="sound-wrong" src="sounds/wrong.mp3"></audio>
</body>
</html>
