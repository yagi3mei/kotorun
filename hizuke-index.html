<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>ひづけゲーム</title>

<link rel="stylesheet"
      href="css/common.css">

<link rel="stylesheet"
      href="css/layout.css">

</head>

<body>

    <div class="header">

        <header class="top-header">

            <a href="index.html">

                <img src="images/kotorun-logo.png"
                    alt="ことラン"
                    class="app-logo">

            </a>

        </header>

        <button id="back-btn-top"
                onclick="goBack()">

            もどる

        </button>

    </div>

    <div class="menu">

        <h1>

            ひづけゲーム

        </h1>

        <!-- カレンダー -->
        <button
            data-key="calendar"
            onclick="goCalendar()">

            カレンダーゲーム<br>

            <small>
                ついたち・ふつか・みっか
            </small>

        </button>

        <!-- 日付 -->
        <button
            data-key="hizuke_day"
            onclick="goRelativeTime('day')">

            きょう・あしたゲーム<br>

            <small>
                きょう・きのう・あした
            </small>

        </button>

        <!-- 週 -->
        <button
            data-key="hizuke_week"
            onclick="goRelativeTime('week')">

            こんしゅう・せんしゅうゲーム<br>

            <small>
                こんしゅう・らいしゅう
            </small>

        </button>

        <!-- 月 -->
        <button
            data-key="hizuke_month"
            onclick="goRelativeTime('month')">

            こんげつ・さらいげつゲーム<br>

            <small>
                こんげつ・らいげつ
            </small>

        </button>

        <!-- 年 -->
        <!-- <button
            data-key="hizuke_year"
            onclick="goRelativeTime('year')">

            ことし・おととしゲーム<br>

            <small>
                ことし・らいねん
            </small>

        </button> -->

        <!-- ランダム -->
        <!-- <button onclick="goRelativeTime('random')">

            ランダム<br>

            <small>
                いろいろな じかんひょうげん
            </small>

        </button> -->

        <small>

         ひづけの ことばを<br>

            れんしゅうします。

        </small>

    </div>

    <script>

        function goCalendar() {

            location.href =
                "calendar-game.html";

        }

        function goRelativeTime(mode) {

            location.href =
                `relative-time-game.html?mode=${mode}`;

        }

        function goBack() {

            location.href =
                "kazu-jikan-index.html";

        }

        /* =========================
            実施済みチェック
        ========================= */

        const scores =
            JSON.parse(
                localStorage.getItem(
                    "kotorun-score"
                )
            ) || {};


        /* -------------------------
            カレンダー
        ------------------------- */

        const calendarScores =
            scores.calendar || {};

        if (calendarScores.calendar)
        {
            document
                .querySelector(
                    '[data-key="calendar"]'
                )
                .classList.add(
                    "completed"
                );
        }


        /* -------------------------
            ひづけゲーム
        ------------------------- */

        const hizukeScores =
            scores.hizuke || {};


        /* day */

        if (hizukeScores.day)
        {
            document
                .querySelector(
                    '[data-key="hizuke_day"]'
                )
                .classList.add(
                    "completed"
                );
        }


        /* week */

        if (hizukeScores.week)
        {
            document
                .querySelector(
                    '[data-key="hizuke_week"]'
                )
                .classList.add(
                    "completed"
                );
        }

        /* month */
        if (hizukeScores.month)
        {
            document
                .querySelector(
                    '[data-key="hizuke_month"]'
                )
                .classList.add(
                    "completed"
                );
        }

        /* year */
        // if (hizukeScores.year)
        // {
        //     document
        //         .querySelector(
        //             '[data-key="hizuke_year"]'
        //         )
        //         .classList.add(
        //             "completed"
        //         );
        // }

    </script>

</body>

</html>
