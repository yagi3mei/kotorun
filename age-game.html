<!-- =========================================
     File: age-game.html
     Purpose: 年齢ゲームのプレイ画面（なんさい？）
     Author: やぎさん
     Created: 2026-05-11

     Notes:
     - 1歳〜20歳の年齢読み学習ゲーム
     - 音声とひらがなを聞いて年齢カードを選択
     - familyゲームをベースに作成
     - 共通スタイル: common.css / layout.css
     - ゲームUI: game.css
========================================= -->

<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ねんれいゲーム</title>

    <!-- 共通 -->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/layout.css">

    <!-- ゲーム系 -->
    <link rel="stylesheet" href="css/game.css">

    <!-- ページ専用 -->
    <link rel="stylesheet" href="css/age.css">

</head>

<body>

    <!-- =====================================
         ヘッダー
    ====================================== -->
    <div class="header">

        <!-- ロゴ -->
        <header class="top-header">

            <a href="index.html">

                <img src="images/kotorun-logo.png"
                     alt="ことラン"
                     class="app-logo">

            </a>

        </header>

        <!-- タイマー -->
        <div id="timer-display">
            0.00
        </div>

        <!-- 残り -->
        <div id="remaining-display">
            0
        </div>

        <!-- ミス数 -->
        <div id="miss-display">
            0
        </div>

    </div>


    <!-- =====================================
         問題表示
    ====================================== -->
    <div class="question-area">

        <!-- 問題 -->
        <div id="question-display">

            なんさい？

        </div>

        <!-- 音声 -->
        <button id="sound-btn">

            🔊

        </button>

    </div>


    <!-- =====================================
         年齢カードエリア
    ====================================== -->
    <div id="age-board"
         class="age-board">

        <!-- JSでカード生成 -->

    </div>


    <!-- =====================================
         戻るボタン
    ====================================== -->
    <div class="button-area">

        <button id="back-btn"
                onclick="goMenu()">

            もどる

        </button>

    </div>


    <!-- =====================================
         結果モーダル
    ====================================== -->
    <div id="result-modal"
         class="modal hidden">

        <div class="modal-content">

            <h2>

                ねんれいゲーム　けっか

            </h2>

            <p id="date-time"></p>

            <p id="final-time"></p>

            <p id="miss-result"></p>

            <button onclick="restartGame()">

                もういちど

            </button>

            <button onclick="goMenu()">

                メニューへ

            </button>

        </div>

    </div>


    <!-- =====================================
         音声
    ====================================== -->

    <!-- 正解音 -->
    <audio id="sound-correct"
           src="sounds/correct.mp3">
    </audio>

    <!-- ミス音 -->
    <audio id="sound-wrong"
           src="sounds/wrong.mp3">
    </audio>


    <!-- =====================================
         ゲームスクリプト
    ====================================== -->
    <script type="module"
            src="js/age-game.js">
    </script>

</body>
</html>
