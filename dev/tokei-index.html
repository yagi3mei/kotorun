<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>とけいゲーム</title>

        padding: 0;

    <button

    </button>

    <button
        class="level-btn intermediate-btn"
